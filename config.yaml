llm_stability:
  providers:
    openai-next:
      api_key: "sk-lq2AlzZ7R0QS1Rlq4fFeAb7e9dF34cC39eD8122848A46362"
      endpoints:
        openai:
          base_url: "http://152.53.52.170:3003/v1"
        anthropic:
          base_url: "http://152.53.52.170:3003"

    ppio:
      api_key: "sk_X3hlaxVt_Cuva-7DEMuT0fYwX4qgOF-Lwq2PlU2ioM4"
      endpoints:
        openai:
          base_url: "https://api.ppinfra.com/openai/v1"
        anthropic:
          base_url: "https://api.ppinfra.com/anthropic"

    volces:
      api_key: "76db9562-1da8-457c-bc67-1c1a9f35931f"
      endpoints:
        openai:
          base_url: "https://ark.cn-beijing.volces.com/api/v3"
        anthropic:
          base_url: "https://ark.cn-beijing.volces.com/api/v3"

    omnimaas:
      api_key: "sk-mFxL0t3VcvzfFJijBdwS0RmE2qeRdKDyTV6jg8KRX0A"
      endpoints:
        openai:
          base_url: "http://18.136.201.255:3000/v1"
        anthropic:
          base_url: "http://18.136.201.255:3000"

    mini-max:
      api_key: "sk-api--NCMNhSLW0WX9Q31sYE5bu0G4abnQbU6Ao1COvSbAZNc8pTdEKsHQHGtZWi_elshkcknZZOacTc9Hc_aHN0LRQKDRlM00n4UJian0Cy3RpSpKoranZqtL9U"
      endpoints:
        openai:
          base_url: "https://api.minimaxi.com/v1"
        anthropic:
          base_url: "https://api.minimaxi.com"

  models:
    deepseek-v3-2-251201:
      providers:
        - provider: volces
          endpoint: openai
          priority: 1
          probe: true

    claude-opus-4-5-20251101:
      providers:
        - provider: openai-next
          endpoint: anthropic
          model_id: claude-opus-4-6
          priority: 1
          probe: true
        - provider: ppio
          endpoint: anthropic
          model_id: pa/claude-opus-4-5-20251101
          priority: 2
          probe: true
        - provider: omnimaas
          endpoint: anthropic
          model_id: claude-opus-4-6
          priority: 3
          probe: true

    glm-4-7-251222:
      providers:
        - provider: volces
          endpoint: openai
          priority: 1
          probe: true

    claude-opus-4-6:
      providers:
        - provider: omnimaas
          endpoint: anthropic
          priority: 1
          probe: true

    glm-5:
      providers:
        - provider: omnimaas
          endpoint: openai
          priority: 1
          probe: true

    MiniMax-M2.7-highspeed:
      providers:
        - provider: mini-max
          endpoint: openai
          priority: 1
          probe: true

    minimax/minimax-m2.7:
      providers:
        - provider: ppio
          endpoint: openai
          priority: 1
          probe: true

  strategies:
    claude-opus-4-5-20251101:
      primary: claude-opus-4-5-20251101
      fallback:
        - deepseek-v3-2-251201
      timeout:
        ttft: 10
        chunk_gap: 15
        per_request: 120
        total: 180

    claude-opus-4-6:
      primary: claude-opus-4-6
      fallback:
        - deepseek-v3-2-251201
      timeout:
        ttft: 10
        chunk_gap: 15
        per_request: 120
        total: 180

    glm-5:
      primary: glm-5
      fallback:
        - glm-4-7-251222
      timeout:
        ttft: 10
        chunk_gap: 15
        per_request: 120
        total: 180

    minimax-m2.7-highspeed:
      primary: MiniMax-M2.7-highspeed
      fallback:
        - glm-4-7-251222
        - minimax/minimax-m2.7
      timeout:
        ttft: 10
        chunk_gap: 15
        per_request: 120
        total: 180

  health_check:
    interval: 30
    failure_threshold: 3
    timeout: 10
    probe_max_tokens: 16000

  metrics:
    enabled: true
    backend: prometheus
    port: 9091
    label_keys: [app_id, cache_token]

  alert:
    channels:
      - type: log
    rules:
      silence_seconds: 60

  state_backend:
    type: memory
